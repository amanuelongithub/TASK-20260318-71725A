version: "3.9"
services:
  api:
    build: .
    env_file: .env
    depends_on:

      - db
    volumes:
      - .:/app
    ports:
      - "8000:8000"
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medical_ops
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    # No host port binding — Redis is internal only; worker/beat/api
    # reach it via the Docker network. Exposing 6379 on the host is
    # unnecessary and blocked by Windows port reservations on many systems.
  worker:
    build: .
    command: celery -A app.tasks.celery_app:celery_app worker -l info
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  beat:
    build: .
    command: celery -A app.tasks.celery_app:celery_app beat -l info
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  nginx:
    image: nginx:1.27
    depends_on:
      - api
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
